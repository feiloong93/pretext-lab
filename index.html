<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Lab</title>
  <meta name="description" content="Text visual effects workbench — real-time preview, parameter tuning, and export.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo">Pretext Lab</span>
      </div>
      <div class="topbar-right">
        <button class="tb-btn" id="btn-bg">◐</button>
        <button class="tb-btn" id="btn-lang">中文</button>
      </div>
    </header>
    <div id="main">
      <aside id="sidebar">
        <div class="sb-input">
          <textarea id="input-text" rows="3" placeholder="输入预览文字...">Pretext Lab — 纯算术文本测量与布局。支持中文、English、العربية 和 emoji 🚀</textarea>
          <div class="sb-upload">
            <label class="sb-upload-btn" id="btn-upload-img">
              <span data-i18n="upload_img">📷 上传图片源</span>
              <input type="file" id="input-img" accept="image/*" hidden>
            </label>
            <span class="sb-upload-name" id="img-name"></span>
            <button class="sb-upload-clear" id="btn-clear-img" hidden>✕</button>
          </div>
        </div>
        <div id="sb-list"></div>
      </aside>
      <main id="preview"><canvas id="canvas"></canvas></main>
      <aside id="panel">
        <div class="panel-scroll">
          <div class="panel-section">
            <div class="panel-head panel-toggle" id="toggle-fx"><span class="sb-arrow">▾</span> <span data-i18n="params">参数调节</span></div>
            <div id="panel-body"></div>
          </div>
          <div class="panel-section">
            <div class="panel-head panel-toggle" id="toggle-post"><span class="sb-arrow">▾</span> <span data-i18n="postfx">后处理</span></div>
            <div id="panel-post"></div>
          </div>
        </div>
        <div class="panel-export" id="panel-export">
          <button class="export-btn" id="btn-export-png">⤓ PNG</button>
          <button class="export-btn" id="btn-export-gif">⤓ GIF</button>
          <button class="export-btn" id="btn-export-vid">⤓ MP4</button>
          <button class="export-btn" id="btn-css">{ } CSS</button>
        </div>
      </aside>
    </div>
  </div>
  <script src="coi-serviceworker.js"></script>
  <script src="app.js"></script>
</body>
</html>
